appId: com.gymflow.app
---
- launchApp

# Navega para a aba de Perfil
- tapOn:
    id: "tab-profile"

# Verifica que a tela de perfil carregou
- assertVisible:
    id: "profile-header-card"

# Abre a tela de alteração de senha via linha de senha
- tapOn:
    id: "profile-password-row"

# Verifica que a tela de alteração de senha carregou
- assertVisible:
    id: "change-password-screen"

- assertVisible:
    id: "change-password-title"

# Verifica que os três campos estão visíveis
- assertVisible:
    id: "change-password-current-password-input"

- assertVisible:
    id: "change-password-new-password-input"

- assertVisible:
    id: "change-password-confirm-password-input"

# Verifica que o botão está presente
- assertVisible:
    id: "change-password-save-button"

# Happy path — preenche os três campos e confirma
- tapOn:
    id: "change-password-current-password-input"

- inputText: "senhaAtual123"

- tapOn:
    id: "change-password-new-password-input"

- inputText: "novaSenha123"

- tapOn:
    id: "change-password-confirm-password-input"

- inputText: "novaSenha123"

- tapOn:
    id: "change-password-save-button"

# Após salvar, volta para a tela de perfil
- assertVisible:
    id: "profile-header-card"

# Re-abre a tela e testa o botão Voltar
- tapOn:
    id: "profile-password-row"

- assertVisible:
    id: "change-password-screen"

- tapOn:
    id: "change-password-back-button"

- assertVisible:
    id: "profile-header-card"

# Fluxo de erro — nova senha com menos de 6 caracteres
- tapOn:
    id: "profile-password-row"

- assertVisible:
    id: "change-password-screen"

- tapOn:
    id: "change-password-current-password-input"

- inputText: "senhaAtual123"

- tapOn:
    id: "change-password-new-password-input"

- inputText: "123"

- tapOn:
    id: "change-password-confirm-password-input"

- inputText: "123"

- tapOn:
    id: "change-password-save-button"

# Erro de validação deve aparecer e permanecer na tela
- assertVisible:
    id: "change-password-screen"
