name: E2E Maestro

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.maestro/**'
      - '.github/workflows/e2e.yml'
      - 'README.md'
      - 'docs/testing.md'

jobs:
  maestro:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Install Maestro CLI
        run: curl -Ls 'https://get.maestro.mobile.dev' | bash

      - name: Verify Maestro CLI
        run: ~/.maestro/bin/maestro --version

      - name: Run Maestro flows (scaffold mode)
        continue-on-error: true
        run: ~/.maestro/bin/maestro test .maestro/
